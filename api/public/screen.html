<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amoebas — Live</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body { overflow: hidden; }
      .layout {
        height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 14px;
        padding: 14px;
        transition: grid-template-columns 0.2s ease;
      }
      .layout.collapsed {
        grid-template-columns: 0px 1fr;
        gap: 0;
        padding-left: 0;
      }
      .left {
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }
      .layout.collapsed .left {
        opacity: 0;
        pointer-events: none;
      }
      .box { padding: 14px; overflow-y: auto; }
      .leader-item {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 0.45rem 0;
        border-bottom: 1px solid var(--line);
      }
      .leader-item:last-child { border-bottom: none; }
      .name { display: inline-flex; align-items: center; gap: 8px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
      .world {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid var(--line);
        min-width: 0;
      }
      #game {
        width: 100%;
        height: 100%;
        display: block;
        background: radial-gradient(circle at 30% 20%, #264d77, #10273d);
      }
      .overlay {
        position: absolute;
        inset: 10px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        pointer-events: none;
      }
      .chip {
        pointer-events: auto;
        background: rgba(5, 8, 14, 0.55);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.4rem 0.75rem;
        font-size: 0.85rem;
        cursor: pointer;
        user-select: none;
      }
      .chip:hover { background: rgba(5, 8, 14, 0.75); }
      .muted { color: var(--muted); font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <main class="layout" id="layout">
      <section class="left">
        <article class="panel box" style="flex: 1;">
          <div style="font-weight: 700; margin-bottom: 0.5rem">Top Scorers</div>
          <div id="leaderboard"><div class="muted">Waiting for agents…</div></div>
        </article>
      </section>

      <section class="world panel">
        <canvas id="game"></canvas>
        <div class="overlay">
          <div class="chip" id="agent-count">Agents: 0</div>
          <div class="chip" id="toggle-btn">☰ Leaderboard</div>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/screen.js"></script>
  </body>
</html>
